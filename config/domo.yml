  #   approved: false

kpi_cards: []
  # - id: "REPLACE_WITH_CARD_ID"
  #   name: "..."
  #   approved: false

# ──────────────────────────────────────────
# Feedback datasets (Step 2a — 11-feedback-agent)
# Queried for triangulation evidence. Aggregation-first. No PII.
# OAuth scope: data (datasets) / dashboard (cards)
#
# discover_cards is NOT used here — feedback sources are intentional.
# New feedback cards/datasets require explicit registration + approval (FR30).
# ──────────────────────────────────────────
feedback_datasets:

  app_reviews:
    - id: "901f1019-a2f0-4a55-a36e-6cbd7c875c9e"
      name: "App Store Reviews"
      source_type: dataset             # SQL-queryable, OAuth scope: data
      approved: true
      columns_discovered: true
      date_column: "date_created"
      country_column: "country_name"   # full country name e.g. 'Australia', not 'AU'
      # NOTE: user_id column present — PM-approved for use in this dataset (not PII in context)
      metrics: ["rating", "topic", "platform", "app_version", "description", "device_model", "type"]

  love_meter:
    - id: "1308353640"
      name: "Love Meter / NPS"
      source_type: card                # accessed via /v1/cards/{id}, OAuth scope: dashboard
