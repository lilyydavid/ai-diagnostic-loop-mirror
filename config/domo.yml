# ──────────────────────────────────────────
# PII exclusion list (enforced at SQL SELECT layer)
# Schema verification checks for these column names before any query.
# Query halts if any are detected. (FR11, FR12, NFR5, NFR6)
# ──────────────────────────────────────────
pii_excluded_columns:
  - user_id
  - card_number
  - payment_details
  - address
  - password
  - login
  - username
  - email
  - phone
  - name
  - first_name
  - last_name
  - full_name

# ──────────────────────────────────────────
# Query time windows (PM-controlled guardrail)
# Every dataset and card query MUST include a date range — no unbounded queries.
# Agent uses these windows to construct the date filter before executing any call.
# Override per-source by adding a query_window_days field on the source entry.
# ──────────────────────────────────────────
query_windows:
  kpi_pages: 28          # 4 full weeks — sharp WoW signal without dilution from older data
  kpi_cards: 28
  kpi_datasets: 28
  app_reviews: 30        # captures feedback from last 1-2 app releases
  love_meter: 60         # NPS runs less frequently; 2 months for sufficient response volume
  cs_tickets: 14         # high volume — 2 weeks is sufficient for current trend detection
  default: 28            # fallback

# ──────────────────────────────────────────
# Loop thresholds (FR3, FR9, FR10, FR31)
# ──────────────────────────────────────────
thresholds:

  # Staleness: re-query feedback sources if findings older than N days
  findings_staleness_days: 7

  # Signal thresholds — per metric type (% movement to trigger hypothesis formation)
  # Tune these based on observed baseline volatility per KPI.
  signal_threshold_pct:
    default: 10                    # fallback if metric type not listed below
    conversion_rate: 5             # checkout CVR, ATC rate — small moves matter
    sessions: 15                   # sessions have higher day-to-day variance
    revenue: 10                    # AOV, GMV
    nps_score: 5                   # NPS shifts are meaningful even at low magnitude
    ratings: 0.2                   # app store rating (absolute, not %)

  # Suspicious metrics — surface to PM, never auto-suppress
  # Agent flags these for PM review; loop continues with flagged note.
  suspicious_metric:
    yoy_flag_pct: 50               # flag if YoY movement exceeds this %
    flag_zero_values: true         # flag metrics with value exactly 0%
    flag_identical_segments: true  # flag if value is identical across all segments
    action: surface_to_pm          # always surface, never suppress

  # Verbatim sampling — per feedback source type
  # Max rows sampled from text fields before passing to LLM (aggregation-first).
  verbatim_sample_max:
    default: 20
    app_reviews: 40                # higher volume; filter inauthentic before sampling
    cs_tickets: 60                 # high volume, diverse issue types
    love_meter: 20
    skincredible: 20

  # App review authenticity filter
  # Applied before verbatim sampling — excludes reviews likely to be inauthentic.
  # Inauthentic signals: very short text, generic phrases, extreme rating with no text.
  app_review_authenticity:
    min_text_length: 20            # exclude reviews shorter than N characters
    exclude_ratings_without_text: true   # exclude 1★ or 5★ with no review body
    exclude_generic_phrases:       # exact-match exclusion list (case-insensitive)
      - "good app"
      - "great app"
      - "nice app"
      - "best app"
      - "love it"
      - "hate it"
      - "ok"
      - "okay"
